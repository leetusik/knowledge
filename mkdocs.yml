site_name: Knowledge Base
site_url: https://leetusik.github.io/knowledge/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

# No `nav:` key and no `strict: true` — ever. Auto-nav from the docs/ tree is
# what lets the /explain skill add pages with zero config; a nav: key would
# orphan every new page, and strict would turn that into a serve failure.

plugins:
  - search
  - tags

# D1: workspace internals under docs/versions/ are history, not site content —
# excluded from the built site (pages, nav, search). docs/current/ stays published.
# Use exclude_docs only; never nav:/strict: (see the load-bearing comment above).
exclude_docs: |
  /versions/

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
