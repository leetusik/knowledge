# Executor-tier configuration for the slice-executor subagents.
# Uncomment/edit the tables you want to change, then apply:
#
#   python3 scripts/workflow.py sync-agents
#
# Everything commented out (or missing) keeps the built-in defaults — the
# values shown below ARE the defaults. Values are written verbatim into the
# agent files, so model aliases (opus/sonnet/haiku), full model IDs, or
# "inherit" all work without code changes. Set effort = "" to omit the effort
# line entirely — required for models that reject the effort parameter
# (e.g. haiku). Models may not be empty.
# This file is yours: the installer seeds it once and updates never overwrite
# it; deleting it is also fine (defaults live in the engine). It holds no
# secrets, so committing it is fine when the whole team should share the tier
# config. After /update-workspace, re-run sync-agents (updates reset the
# agent files to upstream defaults; `validate` warns while they drift).

# Claude Code (.claude/agents/slice-executor-{low,mid,high}.md)
#[claude.low]
#model = "haiku"
#effort = ""
#[claude.mid]
#model = "sonnet"
#effort = "xhigh"
#[claude.high]
#model = "opus"    # e.g. "fable", or "claude-mythos-5" once available
#effort = "xhigh"

# Codex (.codex/agents/slice-executor-{low,mid,high}.toml)
#[codex.low]
#model = "gpt-5.5"
#effort = "medium"
#[codex.mid]
#model = "gpt-5.5"
#effort = "high"
#[codex.high]
#model = "gpt-5.5"
#effort = "xhigh"
