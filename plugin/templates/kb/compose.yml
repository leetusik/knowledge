services:
  kb:
    image: squidfunk/mkdocs-material:9.7.6  # exact pin — upgrades are deliberate and diff-visible
    # --livereload must be explicit: the flag's default never arms in this image,
    # and without it new pages don't appear until the container restarts
    command: serve --dev-addr=0.0.0.0:8000 --livereload
    ports:
      - "{{KB_VIEWER_PORT}}:8000"
    volumes:
      - .:/docs
    restart: unless-stopped

  api:
    # kb-api: DB-backed document API (Track 2). Shares the bind-mounted repo with
    # kb, so a doc POSTed here live-reloads on the 8765 site. Single worker only
    # (in-process write lock) — never scale with --workers.
    build: .
    ports:
      - "{{KB_API_PORT}}:8000"
    volumes:
      - .:/repo
    depends_on:
      # The accounts plane (control plane) lives in Postgres. Wait for it to be
      # healthy so `alembic upgrade head` + the accounts endpoints have a DB.
      postgres:
        condition: service_healthy
    environment:
      KB_ROOT: /repo
      TZ: {{KB_TZ}}
      # KB_API_TOKEN: set to require `Authorization: Bearer <token>` on the two
      # mutating endpoints (POST /api/documents, POST /api/reindex); GETs stay open.
      # Semantic search (Gemini). Empty = feature off -> BM25-only search. Set
      # GOOGLE_API_KEY (or GEMINI_API_KEY) in the host env to enable hybrid search.
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2-preview}
      # Async accounts plane (Postgres). Unset would leave accounts dormant; here
      # it points at the local `postgres` service (psycopg3 scheme). Migrations
      # run explicitly: `docker compose exec api alembic upgrade head`.
      DATABASE_URL: {{KB_DATABASE_URL}}
      # Pins the legacy KB_API_TOKEN master bearer to tenant #1 in tenant mode
      # (the operator's signup email). Local dev can leave it unset — vk_/session
      # tokens still resolve; only the KB_API_TOKEN master-bearer shortcut needs
      # it. Set it (e.g. KB_OPERATOR_EMAIL=operator@test) for the S4 tenant-mode
      # resolution smoke.
      KB_OPERATOR_EMAIL: ${KB_OPERATOR_EMAIL:-}
      # Operator password for the one-shot seed (`docker compose exec api python -m
      # server.seed`, P10.S6). Optional locally (only the seed CLI reads it); set it
      # alongside KB_OPERATOR_EMAIL to seed tenant #1 + the docs/ projects.
      KB_OPERATOR_PASSWORD: ${KB_OPERATOR_PASSWORD:-}
    restart: unless-stopped

  postgres:
    # Control-plane datastore for accounts/tenancy/projects/credentials/sessions
    # (async SQLAlchemy 2.0 + Alembic). Separate from the content plane's
    # disposable kb.sqlite3 — the two never share a connection.
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kb}
      POSTGRES_USER: ${POSTGRES_USER:-kb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  # Durable Postgres data (accounts plane). The content plane stays files +
  # disposable SQLite; only the control plane needs a persistent volume.
  pgdata:
