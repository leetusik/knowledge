services:
  kb:
    image: squidfunk/mkdocs-material:9.7.6  # exact pin — upgrades are deliberate and diff-visible
    # --livereload must be explicit: the flag's default never arms in this image,
    # and without it new pages don't appear until the container restarts
    command: serve --dev-addr=0.0.0.0:8000 --livereload
    ports:
      - "8765:8000"
    volumes:
      - .:/docs
    restart: unless-stopped

  api:
    # kb-api: DB-backed document API (Track 2). Shares the bind-mounted repo with
    # kb, so a doc POSTed here live-reloads on the 8765 site. Single worker only
    # (in-process write lock) — never scale with --workers.
    build: .
    ports:
      - "8766:8000"
    volumes:
      - .:/repo
    environment:
      KB_ROOT: /repo
      TZ: Asia/Seoul
      # KB_API_TOKEN: set to require `Authorization: Bearer <token>` on the two
      # mutating endpoints (POST /api/documents, POST /api/reindex); GETs stay open.
    restart: unless-stopped
