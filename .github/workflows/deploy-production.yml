name: Production Deploy

# Manual, main-only production deploy of the full knowledge site (web UI + API) to the shared Oracle box
# (P9). knowledge runs as a Docker co-tenant behind the standalone `edge` project; the deploy SSHes into
# the box and runs deploy/oracle-production-deploy-remote.sh, which verifies + reconciles the
# publish-on-write clone (/opt/knowledge), rebuilds + health-gates BOTH app services (knowledge-api +
# knowledge-web; the mkdocs knowledge-site was retired in P14.S3), and re-applies the edge vhost.
# Mirrors hi2vi_web's deploy-production.yml, isolated by
# a distinct concurrency group (knowledge-deploy) and checkout path (/opt/knowledge). Never touches
# hi2vi or changple. `workflow_dispatch` ONLY — the agent's constant publish-on-write pushes to `main`
# must NEVER trigger a redeploy. First real run is P9.S5.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.target.outputs.sha }}
    steps:
      - name: Guard main branch
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Production deploys must be run from main; got ${GITHUB_REF}." >&2
            exit 1
          fi
          echo "sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy Oracle Production
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: production
      url: https://knowledge.hi2vi.com
    concurrency:
      group: knowledge-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.target_sha }}

      - name: Validate deploy helpers
        shell: bash
        run: |
          bash -n deploy/deploy.sh \
            deploy/github-actions-production-deploy.sh \
            deploy/oracle-production-deploy-remote.sh

      - name: Deploy through Oracle deploy.sh
        shell: bash
        env:
          TARGET_SHA: ${{ needs.preflight.outputs.target_sha }}
          ORACLE_SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          ORACLE_SSH_KNOWN_HOSTS: ${{ secrets.ORACLE_SSH_KNOWN_HOSTS }}
          ORACLE_SSH_PASSPHRASE: ${{ secrets.ORACLE_SSH_PASSPHRASE }}
          ARTIFACT_DIR: production-deploy-artifacts
        run: deploy/github-actions-production-deploy.sh

      - name: External smoke (public URLs, both surfaces, no secrets)
        shell: bash
        run: |
          set -euo pipefail
          smoke_one() {
            local url="$1"
            for i in 1 2 3 4 5; do
              code="$(curl -fsS -o /dev/null -w '%{http_code}' "${url}" || true)"
              if [ "${code}" = "200" ]; then echo "smoke OK (200): ${url}"; return 0; fi
              echo "attempt ${i} for ${url}: got ${code:-none}; retrying in 6s"; sleep 6
            done
            echo "external smoke failed: ${url} did not return 200" >&2
            return 1
          }
          # Both public surfaces must return 200: the api health endpoint AND `/` (the Next web app).
          smoke_one https://knowledge.hi2vi.com/healthz
          smoke_one https://knowledge.hi2vi.com/

      - name: Upload deploy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-${{ github.run_id }}
          path: production-deploy-artifacts
          if-no-files-found: warn
          retention-days: 14
