name: Production Deploy

# Manual, main-only production deploy of the full knowledge site (web UI + API) to the shared Oracle box
# (P9). knowledge runs as a Docker co-tenant behind the standalone `edge` project; the deploy SSHes into
# the box and runs deploy/oracle-production-deploy-remote.sh, which verifies + reconciles the
# publish-on-write clone (/opt/knowledge), rebuilds + health-gates BOTH app services (knowledge-api +
# knowledge-web; the mkdocs knowledge-site was retired in P14.S3), and re-applies the edge vhost.
# Mirrors hi2vi_web's deploy-production.yml, isolated by
# a distinct concurrency group (knowledge-deploy) and checkout path (/opt/knowledge). Never touches
# hi2vi or changple. `workflow_dispatch` ONLY — the agent's constant publish-on-write pushes to `main`
# must NEVER trigger a redeploy. First real run is P9.S5.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.target.outputs.sha }}
    steps:
      - name: Guard main branch
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Production deploys must be run from main; got ${GITHUB_REF}." >&2
            exit 1
          fi
          echo "sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy Oracle Production
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: production
      url: https://knowledge.hi2vi.com
    concurrency:
      group: knowledge-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.target_sha }}

      - name: Validate deploy helpers
        shell: bash
        run: |
          bash -n deploy/deploy.sh \
            deploy/github-actions-production-deploy.sh \
            deploy/oracle-production-deploy-remote.sh

      - name: Deploy through Oracle deploy.sh
        shell: bash
        env:
          TARGET_SHA: ${{ needs.preflight.outputs.target_sha }}
          ORACLE_SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          ORACLE_SSH_KNOWN_HOSTS: ${{ secrets.ORACLE_SSH_KNOWN_HOSTS }}
          ORACLE_SSH_PASSPHRASE: ${{ secrets.ORACLE_SSH_PASSPHRASE }}
          ARTIFACT_DIR: production-deploy-artifacts
        run: deploy/github-actions-production-deploy.sh

      - name: External smoke (public URLs, all surfaces, no secrets)
        shell: bash
        run: |
          set -euo pipefail
          smoke_one() {
            local url="$1"
            for i in 1 2 3 4 5; do
              code="$(curl -fsS -o /dev/null -w '%{http_code}' "${url}" || true)"
              if [ "${code}" = "200" ]; then echo "smoke OK (200): ${url}"; return 0; fi
              echo "attempt ${i} for ${url}: got ${code:-none}; retrying in 6s"; sleep 6
            done
            echo "external smoke failed: ${url} did not return 200" >&2
            return 1
          }
          # The MCP server's /healthz is INTERNAL only (the api owns the public `= /healthz`),
          # so prove the edge routes /mcp to a LIVE MCP server via the endpoint itself. A bare
          # GET (no `Accept: text/event-stream`) makes the Streamable-HTTP server answer
          # 406 "Client must accept text/event-stream" with a JSON-RPC error body — a routed
          # MCP-server response, NOT a gateway 502/504. NB: NO `curl -f` here — 406 IS the
          # success signal (a non-2xx), so `-f` (fail on HTTP error) would wrongly discard it.
          smoke_mcp() {
            local url="https://knowledge.hi2vi.com/mcp" code tmp
            tmp="$(mktemp)"
            for i in 1 2 3 4 5; do
              code="$(curl -sS -m 15 -o "${tmp}" -w '%{http_code}' "${url}" || true)"
              # 406 (bare GET) or 400 — a routed MCP-server client-error carrying a JSON-RPC
              # body — proves liveness; a 5xx/000 means the edge is not reaching knowledge-mcp.
              if { [ "${code}" = "406" ] || [ "${code}" = "400" ]; } && grep -q 'jsonrpc' "${tmp}"; then
                echo "smoke OK (${code}, routed MCP server): ${url}"; rm -f "${tmp}"; return 0
              fi
              echo "attempt ${i} for ${url}: got ${code:-none}; retrying in 6s"; sleep 6
            done
            echo "external MCP smoke failed: ${url} did not answer as a routed MCP server (got ${code:-none}; a 502/504/none means the edge is not reaching knowledge-mcp)" >&2
            rm -f "${tmp}"; return 1
          }
          # All public surfaces: the api health endpoint, `/` (the Next web app), and the
          # MCP retrieval endpoint (routed-liveness, not a full protocol handshake — the
          # authenticated tool-call E2E over both reachability paths is P15.S4's job).
          smoke_one https://knowledge.hi2vi.com/healthz
          smoke_one https://knowledge.hi2vi.com/
          smoke_mcp

      - name: Upload deploy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-${{ github.run_id }}
          path: production-deploy-artifacts
          if-no-files-found: warn
          retention-days: 14
