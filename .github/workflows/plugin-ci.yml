name: plugin parity

# Root-only drift gate: proves plugin/templates/kb/ stays byte-in-sync with the
# live repo (via scripts/plugin_parity.py, which reuses plugin/setup/render.py).
# This is NOT pages.yml — pages.yml is itself a shipped template and stays
# portable. No mkdocs build here (pages.yml already gates deploys); no claude CLI.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/plugin_parity.py
