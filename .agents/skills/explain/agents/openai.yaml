interface:
  display_name: "explain"
  short_description: "Research a topic in the current repo/conversation and save a novice-friendly educational explainer document to the personal knowledge base (~/projects/personal/knowledge). Use ONLY when the user wants an explanation persisted as a document (explain and document, write this up, document what we just discussed) — NOT for ordinary questions that deserve a normal chat answer."
  default_prompt: "Use the explain skill."
policy:
  allow_implicit_invocation: true
