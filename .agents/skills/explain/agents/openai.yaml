interface:
  display_name: "explain"
  short_description: "Research a topic or code change in the current repo/conversation and save a single self-contained interactive HTML explainer — Background, Intuition, Code, a cited \"Best practices & next steps\" section, and a 5-question quiz — into your own personal knowledge base (the one /knowledge:setup created and configured). Use ONLY when the user wants an explanation persisted as a document (explain and document, write this up, document what we just changed) — NOT for ordinary questions that deserve a normal chat answer."
  default_prompt: "Use the explain skill."
policy:
  allow_implicit_invocation: true
