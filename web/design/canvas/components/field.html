<!-- @dsCard group="Components" name="Field" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>knowledge · Field</title>
<link rel="stylesheet" href="../tokens.css" />
<style>
  body { margin: 0; padding: 40px; background: var(--color-canvas); color: var(--color-ink); font-family: var(--font-sans); }
  .eyebrow { font-size: var(--text-micro); letter-spacing: var(--text-micro--letter-spacing); font-weight: var(--text-micro--font-weight); text-transform: uppercase; color: var(--color-green-dark); }
  h1 { margin: 6px 0 4px; font-size: var(--text-heading-2); font-weight: var(--text-heading-2--font-weight); }
  .lede { margin: 0 0 28px; max-width: 64ch; font-size: var(--text-body-md); line-height: var(--text-body-md--line-height); color: var(--color-slate); }
  .form { max-width: 420px; display: flex; flex-direction: column; gap: 18px; }
  label { display: block; margin-bottom: 6px; font-size: var(--text-body-sm); font-weight: 500; color: var(--color-charcoal); }
  .control { width: 100%; box-sizing: border-box; border-radius: var(--radius-md); border: 1px solid var(--color-hairline-strong); background: var(--color-surface); padding: 10px 14px; font-size: var(--text-body-md); color: var(--color-ink); font-family: var(--font-sans); }
  .control::placeholder { color: var(--color-steel); }
  .control:focus-visible { outline: 2px solid var(--color-green-deep); outline-offset: 2px; }
  .control--invalid { border-color: var(--color-danger); }
  .err { margin: 6px 0 0; font-size: var(--text-body-sm); color: var(--color-danger); }
  .check-row { display: flex; align-items: flex-start; gap: 10px; }
  .check-row input { width: 20px; height: 20px; accent-color: var(--color-green); }
</style>
</head>
<body>
  <p class="eyebrow">Components · Field</p>
  <h1>Field</h1>
  <p class="lede">
    Label / Input / Textarea / Checkbox / FieldError from
    <code>web/src/components/ui/field.tsx</code>. Input border is
    <code>hairline-strong</code>; focus uses the global green-deep ring; the
    error state is driven off <code>aria-invalid</code> (the <code>danger</code> token).
  </p>
  <div class="form">
    <div>
      <label for="pname">Project name</label>
      <input class="control" id="pname" placeholder="acme-support" />
    </div>
    <div>
      <label for="note">Note</label>
      <textarea class="control" id="note" rows="3" placeholder="설명을 입력하세요"></textarea>
    </div>
    <div>
      <label for="bad">Invalid example</label>
      <input class="control control--invalid" id="bad" value="!!" aria-invalid="true" />
      <p class="err">This field has an error.</p>
    </div>
    <div class="check-row">
      <input type="checkbox" id="agree" checked />
      <label for="agree" style="margin:0">Revoke this credential</label>
    </div>
  </div>
</body>
</html>
