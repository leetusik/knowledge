# Production deployment for https://knowledge.hi2vi.com (P8.S3).
#
# This is the OCI-box compose project — NOT the local dev stack (compose.yml).
# It ships `api` (the document API + CLI control plane), `web` (the Next.js
# standalone app — the public landing at `/`, the authenticated UI, and the
# `/api/auth/*` BFF, P14.S3), and `postgres` (the control-plane datastore, P10).
# The mkdocs `site` viewer that used to serve `/` was RETIRED in P14 (its content
# lives on as tenant #1's knowledge in the app + api; nothing is lost).
# The box runs the API from its
# OWN git clone (e.g. /opt/knowledge) with an SSH `origin` + deploy key, so the
# container can commit AND push writes to origin/main (publish-on-write, P8.S1).
#
# Reached by the box's dedicated edge (compose project `edge` at /home/opc/edge,
# container `edge-nginx`) over `changple_shared_network`, BY CONTAINER NAME — NO
# public host-port publish. See deploy/README.md for the bring-up runbook and
# deploy/knowledge.conf for the vhost it drops onto the edge. NO SECRETS live here:
# KB_API_TOKEN + GOOGLE_API_KEY come from the box's gitignored `.env`; the deploy
# key + known_hosts are bind-mounted from the box.

services:
  api:
    build: .                       # same Dockerfile as local (git + tzdata + deps)
    container_name: knowledge-api  # fixed name — the edge proxies to it by name
    # Box clone bind-mounts at /repo exactly like local: `.` is the box clone
    # root (/opt/knowledge), so the container commits+pushes into a real clone
    # with an SSH `origin` remote (see runbook: origin must be the SSH form
    # git@github.com:leetusik/knowledge.git).
    volumes:
      - .:/repo
      # Push credential, mounted READ-ONLY from the box (never in the repo).
      # /opt/knowledge-secrets holds `knowledge_deploy_key` (private half of the
      # GitHub deploy key, chmod 600) + `known_hosts` (pinned github.com host key).
      - /opt/knowledge-secrets:/run/secrets:ro
    env_file:
      # Box-only, gitignored. Holds the SECRETS by name (no values in the repo):
      #   KB_API_TOKEN=<generated>          # bearer for writes + (with the flag) reads
      #   GOOGLE_API_KEY=<optional Gemini>  # empty/absent = BM25-only search
      #   POSTGRES_PASSWORD=<generated>     # accounts-plane Postgres password
      #   KB_OPERATOR_EMAIL=<operator email> # pins KB_API_TOKEN -> tenant #1 (P10)
      #   KB_OPERATOR_PASSWORD=<operator pw> # seeds the operator user (P10.S6 seed)
      # Provisioned in P8.S4's runbook. `docker compose config` needs this file
      # to exist (a dummy one suffices for local validation).
      - .env
    environment:
      # --- Non-secret box config (literals; safe to commit) ---
      KB_ROOT: /repo
      TZ: Asia/Seoul
      # Publish-on-write ON (box only). Default is false so local/plugin never
      # push; the box opts in. After the scoped commit the server fetches +
      # rebases onto origin/main and pushes (best-effort; a failed push never
      # fails the request). Requires the deploy key wired below.
      KB_GIT_PUSH: "true"
      # Gate reads/search behind the same bearer on the hosted deployment
      # (local/plugin default is false → reads open). healthz stays open.
      KB_REQUIRE_READ_AUTH: "true"
      # Origin for the 201 `url` field (server/main.py builds {base}/{project}/
      # {date}-{slug}/). config.py rstrips any trailing slash, so give none here.
      # ⚠ CAVEAT (P14.S3, left UNCHANGED deliberately): the mkdocs `site` that used
      # to serve that path at `/` is retired, so this `url` no longer resolves to a
      # rendered page (the Next app has no such route). COSMETIC ONLY — docs are read
      # by id via the api/app, never this link. Repointing it (to the public docs/
      # GitHub-Pages track, or degrading it cleanly) is deferred to the operator's
      # prod cutover / a future docs effort; S3 does not change it.
      KB_PUBLIC_BASE_URL: https://knowledge.hi2vi.com
      # Fetch + reindex on boot (drift + deleted-doc reconciliation self-heal).
      KB_STARTUP_REINDEX: "true"
      # Async accounts plane (Postgres control plane, P10). Points at the durable
      # `postgres` service below by container name over the shared network. The
      # password is the SECRET POSTGRES_PASSWORD from the box's gitignored `.env`
      # (never committed); user/db are the literals `kb`. Migrations run
      # explicitly on deploy: `docker compose exec api alembic upgrade head`.
      DATABASE_URL: postgresql+psycopg://kb:${POSTGRES_PASSWORD}@knowledge-postgres:5432/kb
      # Pins the legacy KB_API_TOKEN master bearer to tenant #1 in tenant mode:
      # the operator's SIGNUP email (must match the user seeded in S6). The live
      # hi2vi content agent keeps using KB_API_TOKEN, which this resolves to
      # tenant #1 (interpolated from the box's gitignored `.env`, a P10 deploy
      # prerequisite alongside POSTGRES_PASSWORD — an email, not a secret, but
      # kept out of the committed file so it can't drift from the seeded value).
      # Unset -> the master bearer is unresolvable (vk_/session tokens still work).
      KB_OPERATOR_EMAIL: ${KB_OPERATOR_EMAIL}
      # Operator's password for the one-shot seed (`docker compose exec api python
      # -m server.seed`): creates the operator user + tenant #1 + the live docs/
      # projects so the KB_API_TOKEN master bearer resolves and the docs/ corpus
      # re-stamps as tenant #1 (P10.S6). Interpolated from the box's gitignored
      # `.env` (a P10 deploy prerequisite alongside POSTGRES_PASSWORD +
      # KB_OPERATOR_EMAIL). Only the seed CLI reads it — never at request time.
      KB_OPERATOR_PASSWORD: ${KB_OPERATOR_PASSWORD}
      # --- Push credential wiring (paths inside the container) ---
      # IdentitiesOnly: use ONLY this key (ignore any agent/default keys).
      # UserKnownHostsFile + StrictHostKeyChecking=yes: pin github.com's host key
      # so the first push cannot be silently MITM'd (no blind TOFU accept). We
      # pin rather than `accept-new` because github.com's host keys are static
      # and publicly verifiable — see the runbook for generating known_hosts and
      # verifying the fingerprints against GitHub's published set. If you prefer
      # convenience over pinning, swap StrictHostKeyChecking=yes → accept-new and
      # drop the UserKnownHostsFile line (weaker: trusts the first key seen).
      GIT_SSH_COMMAND: >-
        ssh -i /run/secrets/knowledge_deploy_key
        -o IdentitiesOnly=yes
        -o UserKnownHostsFile=/run/secrets/known_hosts
        -o StrictHostKeyChecking=yes
    # Wait for the accounts-plane Postgres to be healthy before the api boots
    # (so alembic + the control-plane endpoints always have a live DB).
    depends_on:
      postgres:
        condition: service_healthy
    # Attach to the existing external Docker network the edge lives on. The api
    # is reachable ONLY here (knowledge-api:8000), never on a public host port.
    networks:
      - changple_shared_network
    # Container health for `docker compose ps` + the runbook health assertion.
    # Uses the image's own python (curl is not in the slim image); start_period
    # covers the KB_STARTUP_REINDEX boot window before the server accepts traffic.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else sys.exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  web:
    # The Next.js 16 standalone app (P14): the public landing at `/`, the
    # authenticated UI (/dashboard, /graph, /documents, /projects, /login,
    # /signup), and the `/api/auth/*` BFF. Multi-stage build from web/Dockerfile
    # (output:'standalone' → node server.js). Reached by the edge BY CONTAINER NAME
    # (knowledge-web:3000) over changple_shared_network — NO public host-port
    # publish. Replaces the retired mkdocs `site` as the `/` web UI (P14.S3).
    build:
      context: ./web
      args:
        # Public app origin, baked into the client bundle at build time
        # (src/content/site.ts → canonical URL / OG / sitemap / robots). A build
        # arg, not a runtime env — changing it needs a rebuild. Safe to commit.
        NEXT_PUBLIC_APP_URL: "https://knowledge.hi2vi.com"
    container_name: knowledge-web  # fixed name — the edge proxies to it by name
    environment:
      # Server-to-server base URL of the api container the BFF calls (the browser
      # NEVER sees it — server-only, not NEXT_PUBLIC_). A literal container-name
      # URL over the shared network; NOT a secret.
      KB_API_BASE_URL: http://knowledge-api:8000
      # Secret the AES-256-GCM session key derives from (sha256) to seal the
      # bearer token into the httpOnly session cookie. A NEW box secret the
      # OPERATOR MUST GENERATE into the gitignored `.env` (e.g. `openssl rand
      # -base64 32`) — SESSION_SECRET=<value>. Rotating it invalidates every live
      # session (all users re-login). Interpolated from `.env` here (like the api's
      # POSTGRES_PASSWORD) rather than `env_file: .env`, so the api's KB_API_TOKEN /
      # POSTGRES_PASSWORD / operator creds are NOT injected into the web container.
      # Unset/blank → the BFF throws at request time (src/lib/env.ts) — `docker
      # compose config` still passes (a dummy value suffices for local validation).
      SESSION_SECRET: ${SESSION_SECRET}
    # Documentary only (no publish) — the edge reaches it over the shared network.
    expose:
      - "3000"
    # Do not start the web app until the api it proxies to is healthy.
    depends_on:
      api:
        condition: service_healthy
    networks:
      - changple_shared_network
    # Container health for `docker compose ps` + the deploy health-gate. node 22
    # has global fetch; start_period covers the standalone server's cold boot.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    # Durable control-plane datastore (accounts/tenancy/projects/credentials/
    # sessions) for the P10 two-plane app. Reached by the api BY CONTAINER NAME
    # (knowledge-postgres:5432) over the shared network — NO public host port.
    # Content plane is unaffected: it stays files + disposable kb.sqlite3.
    image: postgres:17
    container_name: knowledge-postgres  # fixed name — the api's DATABASE_URL targets it
    environment:
      # user/db are non-secret literals; the PASSWORD is the SECRET, supplied by
      # the box's gitignored `.env` (POSTGRES_PASSWORD=...). Never commit a value.
      POSTGRES_DB: kb
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - changple_shared_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  # Durable Postgres data (accounts plane). Only the control plane needs a
  # persistent volume; the content plane stays files + disposable SQLite.
  pgdata:

networks:
  # Pre-existing external network the shared edge + co-tenant apps share.
  # `external: true` = compose attaches to it, never creates/removes it.
  changple_shared_network:
    external: true
