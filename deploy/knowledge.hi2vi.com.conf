# knowledge.hi2vi.com — reverse-proxy vhost for the knowledge document API.
#
# Ready-to-drop onto the shared edge `changple5-nginx-1`
# (/etc/nginx/conf.d/knowledge.hi2vi.com.conf). Proxies to the `knowledge-api`
# container over `changple_shared_network`. See deploy/README.md for the apply +
# re-apply runbook.
#
# IMPORTANT — this conf is UNDECLARED runtime state on changple5-nginx-1, wiped
# on every changple5 deploy (the depends_on recreation cascade — see
# docs/hi2vi_web/2026-07-02-shared-nginx-explained.md). After any changple5
# deploy, assume knowledge.hi2vi.com is DOWN until the (extended) re-apply runs.

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (port 80). Cloudflare talks HTTPS to the origin, but
# keep this for consistency with the edge's other vhosts / direct-hit safety.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name knowledge.hi2vi.com;
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS vhost (port 443).
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # HTTP/2: on nginx >= 1.25.1 add `http2 on;` here; on older nginx use
    # `listen 443 ssl http2;` instead. Match whatever the edge's other vhosts
    # (hi2vi.com.conf) already use so `nginx -t` stays clean.
    server_name knowledge.hi2vi.com;

    # --- TLS: Cloudflare Origin CA cert ------------------------------------
    # ASSUMPTION (per the P8 hosting proposal): hi2vi.com uses a single
    # *.hi2vi.com WILDCARD Cloudflare Origin CA cert, which already covers
    # knowledge.hi2vi.com — so we reference the SAME cert files hi2vi.com.conf
    # references. CONFIRM AT APPLY: open hi2vi.com.conf on the edge and copy its
    # exact `ssl_certificate` / `ssl_certificate_key` paths here.
    #
    # PER-HOST-CERT VARIANT: if hi2vi.com uses a per-host (non-wildcard) origin
    # cert, the wildcard assumption is wrong — provision a dedicated
    # knowledge.hi2vi.com Cloudflare Origin CA cert and point the two lines below
    # at it (e.g. /etc/nginx/certs/knowledge.hi2vi.com.pem + .key) instead.
    ssl_certificate     /etc/nginx/certs/hi2vi.com.pem;      # CONFIRM: match hi2vi.com.conf
    ssl_certificate_key /etc/nginx/certs/hi2vi.com.key;      # CONFIRM: match hi2vi.com.conf
    ssl_protocols       TLSv1.2 TLSv1.3;                     # drop if the edge sets this globally in http{}

    # doc writes are markdown JSON payloads — small, but give headroom.
    client_max_body_size 5m;

    location / {
        # --- Docker-DNS re-resolution (the explainer's Option-B rule) --------
        # Without this, nginx resolves knowledge-api's IP ONCE at startup and
        # caches it forever; when the api container is recreated (new IP) the
        # proxy would forward to a dead address. The embedded resolver
        # (127.0.0.11 = Docker's internal DNS) + a VARIABLE upstream forces
        # nginx to re-resolve every 30s, so the proxy survives api recreation.
        resolver 127.0.0.11 valid=30s;
        set $kb_upstream http://knowledge-api:8000;
        proxy_pass $kb_upstream;   # no URI part → original request URI passes through

        # --- Standard proxy headers -----------------------------------------
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;   # startup reindex can make the first hit slow
    }
}
