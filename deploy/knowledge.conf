# knowledge.conf — knowledge.hi2vi.com, the full self-hosted knowledge site.
#
# WHAT THIS IS: the nginx vhost fronting the box containers (compose.prod.yml) on
# the OCI box. It terminates the origin TLS Cloudflare connects to and routes by
# path over the external `changple_shared_network`. Three upstreams (P14.S3, P15.S3):
#   * the CLI control plane — `/api/*`, `/auth/*`, `/app/*`, `= /healthz` ->
#     `knowledge-api:8000` (FastAPI, the P13 CLI contract, UNCHANGED);
#   * the Next.js app — `/api/auth/*` (the BFF, more specific than `/api/`) and
#     everything else (`/` landing, `/dashboard`, `/graph`, `/login`, assets, ...)
#     -> `knowledge-web:3000`; and
#   * the MCP retrieval server — `/mcp` (Streamable-HTTP/SSE, agent tools) ->
#     `knowledge-mcp:9000` (P15.S3; SSE-safe location — see it below).
# The mkdocs `knowledge-site` viewer that used to serve `/` was RETIRED in P14.
# Modeled on the edge's proven hi2vi.conf.
#
# WHERE IT LANDS: /home/opc/edge/conf.d/knowledge.conf on the box — the dedicated
# edge (compose project `edge` at /home/opc/edge, container `edge-nginx`, owner of
# :80 + :443). conf.d/ and certs/ are READ-ONLY HOST BIND MOUNTS, so the edge's
# config is declarative host state: applying a change is a file drop plus a reload.
#
#     scp deploy/knowledge.conf oracle-cloud:/home/opc/edge/conf.d/knowledge.conf
#     ssh oracle-cloud 'cd /home/opc/edge && ./deploy.sh'
#
# ./deploy.sh is the edge's own apply path: a hard `nginx -t` gate inside the
# RUNNING container, then a graceful `nginx -s reload` — and never a recreate
# (recreating drops the runtime network attachment; that cascade is exactly what
# the dedicated edge was built to remove). A failed `nginx -t` reloads nothing, so
# the edge keeps serving its last known-good config. ./validate.sh is the optional
# local pre-gate (dummy certs + compose config + throwaway-container nginx -t over
# the whole tree). NEVER `docker cp` into edge-nginx; never `docker compose
# up`/`restart` the edge. See deploy/README.md §3.
#
# HOUSE RULES — the conf.d/ tree is tested and reloaded AS A UNIT, so breaking one
# of these breaks EVERY site on the edge, not just this one:
#   * NEVER default_server. 00-default.conf owns the :80 and :443 catch-alls
#     (unknown Host -> 444). This vhost routes by Host/SNI only.
#   * NO IPv6 `listen [::]:...`. No sibling conf listens on v6, so adding it here
#     would silently make THIS vhost the default server for all v6 traffic.
#   * NO limit_req_zone — see the note below.
#
# --- NO rate-limit zone here — deliberate ------------------------------------
# limit_req_zone lives in the http context and its zone NAME is GLOBAL across the
# whole conf.d/ tree. hi2vi.conf declares the tree's only one (`hi2vi_contact`); a
# duplicate name is a hard `nginx -t` failure that would block the reload for every
# site on the edge. So there is NO limit_req_zone here, ever.
#
# /api/* still needs none: every call is bearer-gated (KB_REQUIRE_READ_AUTH=true on
# the box) behind Cloudflare. But P13.S5 routes /auth/* (an UNAUTHENTICATED password
# grant + open signup) to the api below, and that surface DOES need throttling — so
# it is throttled SERVER-SIDE, by an in-process per-IP limiter in server/auth_api.py
# (single uvicorn worker → one coherent counter), NOT with a zone here. That keeps
# the fragile shared conf.d/ tree free of a global zone name while still capping the
# now-public grant. The Cloudflare real-IP restore below is what makes both the
# server-side limiter and the access logs key off real visitors.

# =====================================================================
# :80 — redirect everything to HTTPS. A server-level `return` executes before
# location matching, so nothing else is needed here.
# =====================================================================
server {
    listen 80;
    server_name knowledge.hi2vi.com;

    return 301 https://$host$request_uri;
}

# =====================================================================
# :443 — the API vhost.
# =====================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name knowledge.hi2vi.com;

    # TLS: the edge's Cloudflare Origin CA cert for hi2vi. Its SANs are
    # `DNS:*.hi2vi.com, DNS:hi2vi.com` (verified on the box; valid to 2041), so the
    # WILDCARD ALREADY COVERS knowledge.hi2vi.com — there is nothing to provision
    # and no per-host cert. Re-check with:
    #   openssl x509 -in /home/opc/edge/certs/hi2vi.crt -noout -text \
    #     | grep -A1 'Subject Alternative Name'
    ssl_certificate     /etc/nginx/certs/hi2vi.crt;
    ssl_certificate_key /etc/nginx/certs/hi2vi.key;

    # Docker DNS re-resolution (LOAD-BEARING): the upstream is the knowledge-api
    # CONTAINER, whose IP changes every time it is recreated (a rebuild, a box
    # reboot). 127.0.0.11 (Docker's embedded DNS) + a VARIABLE in proxy_pass forces
    # nginx to re-resolve at request time honoring valid=30s, so an api restart
    # self-heals. Without this, nginx resolves the name ONCE at load and proxies to
    # a dead IP forever.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    set $knowledge_upstream knowledge-api;
    set $knowledge_web_upstream knowledge-web;
    set $knowledge_mcp_upstream knowledge-mcp;

    # --- Cloudflare real-IP restore -----------------------------------------
    # Rewrites $remote_addr to the true client IP from CF-Connecting-IP, so access
    # logs (and any future limiter) key off real visitors, not the Cloudflare edge.
    # Ranges as published at https://www.cloudflare.com/ips/ — the same list the
    # sibling confs carry; refresh them together, never one file alone.
    # IPv4:
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6:
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # HSTS — house style: short max-age, NO preload. Bump only as a deliberate
    # post-cutover decision, once HTTPS is confirmed healthy.
    add_header Strict-Transport-Security "max-age=300" always;

    # Doc writes carry a whole research markdown body inside the JSON payload.
    # hi2vi's 64k would 413 a long document; 5m is generous headroom for text.
    client_max_body_size 5m;

    # --- Shared proxy headers — HOISTED to server level ----------------------
    # HEADER-INHERITANCE FOOTGUN: nginx inherits proxy_set_header directives into
    # a `location` ONLY IF that location sets NONE of its own — the first
    # proxy_set_header inside a location drops the ENTIRE inherited set. With
    # several locations across two upstreams, keeping the shared headers here (and
    # letting every location set NONE) is what guarantees BOTH the api and the web
    # upstreams get the full Host / real-IP / forwarded set + HTTP/1.1 keep-alive
    # scrub. Every location below (including the new /api/auth/) sets none.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # --- ROUTING — most-specific match wins ----------------------------------
    # nginx picks the LONGEST matching prefix (order-independent; there are no regex
    # locations here), so the map is:
    #   = /healthz, /api/, /auth/, /app/  -> knowledge-api  (FastAPI CLI control plane)
    #   /api/auth/                        -> knowledge-web   (the Next BFF; beats /api/)
    #   /mcp                              -> knowledge-mcp   (Streamable-HTTP MCP tools)
    #   /  (everything else)              -> knowledge-web   (the Next app + assets)
    # /api/auth/ is MORE SPECIFIC than /api/, so the Next BFF's own auth routes go
    # to the web app while every other /api/* call still reaches FastAPI — FastAPI
    # has no /api/auth/* route, so nothing is shadowed. The `/` catch-all now serves
    # the Next app (landing + authed UI + its assets), NOT the retired mkdocs site.
    #
    # CONTRACT (P13.S5, kept in P14.S3): the machine/CLI public surface is
    # /api/* + /auth/* + /app/* + /healthz -> knowledge-api (docs/current/api.md
    # says so), UNCHANGED. P13's agent-first CLI signs up, logs in, creates a project
    # and mints a key without a browser. Publishing /auth/* exposes an
    # UNAUTHENTICATED password grant + open signup: throttled SERVER-SIDE (an
    # in-process per-IP limiter in server/auth_api.py), NOT with a limit_req_zone
    # here — see the "NO rate-limit zone" note at the top.
    #
    # The Next BFF (/api/auth/*) is browser-facing and session-cookie-gated in the
    # app; it does its own upstream call to knowledge-api server-side, so it needs no
    # edge throttle of its own.
    location /api/ {
        # Variable form forces request-time DNS re-resolution (resolver note above).
        proxy_pass http://$knowledge_upstream:8000;

        proxy_connect_timeout 5s;
        # A write does git fetch + rebase + push to GitHub and (when GOOGLE_API_KEY
        # is set) a best-effort Gemini embed, and the first request after a boot can
        # wait on KB_STARTUP_REINDEX — so this is far from instant. 120s is the
        # ORIGIN-side ceiling, not a promise: Cloudflare itself gives up at ~100s
        # (a 524 to the client) no matter what nginx allows here.
        proxy_read_timeout 120s;
    }

    # The Next.js BFF's auth routes (sign-in / sign-out / session refresh). MORE
    # SPECIFIC than /api/, so it wins the longest-prefix match and reaches the web
    # app — FastAPI has no /api/auth/* route, so nothing is shadowed. Variable
    # proxy_pass for request-time DNS re-resolution (resolver note above); NO
    # per-location proxy_set_header (the footgun documented at the hoist above).
    location /api/auth/ {
        proxy_pass http://$knowledge_web_upstream:3000;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Control-plane session + tenant/project/credential routes. Mirrors /api/
    # exactly — same upstream (variable form for re-resolution), same timeouts, and
    # deliberately NO per-location proxy_set_header (the first one would drop the
    # entire inherited server-level set — the footgun documented at the hoist above).
    location /auth/ {
        proxy_pass http://$knowledge_upstream:8000;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    location /app/ {
        proxy_pass http://$knowledge_upstream:8000;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    location = /healthz {
        proxy_pass http://$knowledge_upstream:8000;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    # The MCP-over-HTTP retrieval server (knowledge-mcp:9000, P15.S3): the `search` +
    # `fetch_document` tools on ONE Streamable-HTTP endpoint at /mcp. MORE SPECIFIC
    # than `/` and disjoint from `/api/` (no collision), so longest-prefix routing
    # sends /mcp here and everything else stays put. Variable proxy_pass for
    # request-time DNS re-resolution (resolver note above), so an mcp-container
    # restart self-heals. Deliberately NO per-location proxy_set_header — it inherits
    # the FULL server-level set (Host / real-IP / X-Forwarded-* AND proxy_http_version
    # 1.1 + `Connection ""`; the footgun documented at the hoist above). That inherited
    # HTTP/1.1 keep-alive is REQUIRED for the streamed Streamable-HTTP/SSE response.
    #
    # SSE-SAFE: proxy_buffering off streams the response straight through (buffering
    # would delay/break the SSE stream — the MCP server already sends
    # `X-Accel-Buffering: no` on its stream, and this makes the intent explicit at the
    # edge), and long read/send timeouts tolerate a slow stream. NB: Cloudflare still
    # caps an origin response at ~100s (a 524) regardless — so the deployed server runs
    # STATELESS (MCP_STATELESS_HTTP=1, compose.prod.yml) and each tool call is a bounded
    # per-call proxy well under that ceiling; these long timeouts just keep a single
    # streamed call from being cut on the origin side. NO limit_req_zone here (the
    # global-name footgun; /mcp is bearer-gated per tool call upstream anyway).
    location /mcp {
        proxy_pass http://$knowledge_mcp_upstream:9000;

        proxy_connect_timeout 5s;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        # The Next.js app (knowledge-web): the public landing at `/`, the
        # authenticated UI (/dashboard, /graph, ...), /login, /signup, and all
        # Next assets. No URI part after the port => the original request URI passes
        # through unchanged (and the variable form is what makes re-resolution work).
        proxy_pass http://$knowledge_web_upstream:3000;
    }
}
